# Dev overrides — must be loaded explicitly to prevent accidental use in prod.
#! Adds port bindings, env_file, volume mounts, and hot reload.
services:
  backend:
    command: ["uvicorn", "backend.app:app", "--reload", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - ./backend:/app/backend
    env_file: .env
    # Exposed on localhost for bare-metal tools (curl, browser, DBeaver).
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    volumes:
      - ./bot/bot:/app/bot/bot
    env_file: .env

  scraper:
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: coupette-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Exposed on localhost for bare-metal tools (alembic, make dev, DBeaver).
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt: [no-new-privileges:true]
    # Drop everything, then re-add only what Postgres needs to init its data dir.
    # CHOWN/FOWNER: initdb sets ownership of /var/lib/postgresql/data to postgres user.
    # SETUID/SETGID: entrypoint drops from root to postgres via gosu.
    # DAC_READ_SEARCH: reads data dir before ownership is transferred.
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, DAC_READ_SEARCH, CHOWN, FOWNER]

  redis:
    image: redis:7-bookworm
    container_name: coupette-redis
    command: redis-server --save "" --appendonly no --bind 0.0.0.0
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
    name: saq-sommelier_pgdata
