[project]
name = "coupette-core"
version = "1.0.0"
description = "Core infrastructure for Coupette (models, config, logging)"
requires-python = ">=3.12,<4.0"
dynamic = ["dependencies"]

[tool.poetry]
packages = [{include = "core", from = ".."}]

[tool.poetry.dependencies]
sqlalchemy = "^2.0"
alembic = "^1.13"
psycopg2-binary = "^2.9"
pgvector = ">=0.3"
loguru = ">=0.7"
pydantic-settings = "^2.13"

[project.optional-dependencies]
embeddings = ["openai>=1.0"]

[tool.poetry.group.dev.dependencies]
pip-audit = ">=2.7"
ruff = "^0.15.8"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["B", "E", "F", "I", "N", "RET", "RUF", "S", "SIM", "TCH", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["core"]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["F821"]  # autogenerated migrations may reference unimported names

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
