# Base configuration — service topology + security hardening.
# NO restart, mem_limit, env_file, or dev port bindings — those live in overlays.
# Dev: auto-loads docker-compose.override.yml (ports, env_file, hot reload).
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
name: coupette
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coupette-backend
    # Filesystem is immutable — prevents writes if the container is compromised.
    read_only: true
    # Blocks privilege escalation (e.g. setuid binaries).
    security_opt: [no-new-privileges:true]
    # Drop ALL Linux capabilities — app needs none
    cap_drop: [ALL]
    # Rotate logs so they don't fill the disk (3 × 50 MB = 150 MB max per service).
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
        # Not required so prod works without the dev postgres service.
        required: false

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      # Compose service name for container-to-container networking.
      BACKEND_URL: http://backend:8001
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    # One-shot job — don't restart after exit. Systemd timer handles scheduling.
    restart: "no"
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # --- Profiled services (not started by default) ---

  migrate:
    profiles: ["migrate"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["alembic", "-c", "core/alembic.ini", "upgrade", "head"]
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  postgres:
    profiles: ["dev"]
    image: pgvector/pgvector:pg16
    container_name: coupette-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt: [no-new-privileges:true]
    # Drop everything, then re-add only what Postgres needs to init its data dir.
    # CHOWN/FOWNER: initdb sets ownership of /var/lib/postgresql/data to postgres user.
    # SETUID/SETGID: entrypoint drops from root to postgres via gosu.
    # DAC_OVERRIDE: reads/writes data dir before ownership is transferred.
    cap_drop: [ALL]
    # TODO: re-evaluate these caps for production.
    cap_add: [SETUID, SETGID, DAC_READ_SEARCH, CHOWN, FOWNER]
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    external: true
