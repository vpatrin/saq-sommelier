# Base configuration — service topology + security hardening.
# NO restart, mem_limit, env_file, or dev port bindings — those live in overlays.
# Dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key order: image/build → container_name → command → shm_size → volumes/tmpfs →
#   env_file → ports → depends_on → networks → healthcheck → restart/mem_limit →
#   read_only → security_opt/cap_drop/cap_add → logging
name: coupette
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coupette-backend
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Filesystem is immutable — prevents writes if the container is compromised.
    read_only: true
    # Blocks privilege escalation (e.g. setuid binaries).
    security_opt: [no-new-privileges:true]
    # Drop ALL Linux capabilities — app needs none
    cap_drop: [ALL]
    # Rotate logs so they don't fill the disk (3 × 50 MB = 150 MB max per service).
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    networks:
      - internal
    # One-shot job — don't restart after exit. Systemd timer handles scheduling.
    restart: "no"
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # --- On-demand services (not started by default) ---

  migrate:
    profiles: ["migrate"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["alembic", "-c", "core/alembic.ini", "upgrade", "head"]
    networks:
      - internal
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

volumes:
  pgdata:

networks:
  internal:
    external: true
