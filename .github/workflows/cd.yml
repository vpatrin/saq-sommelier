name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit SHA on main to deploy (builds images from source)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ghcr.io/vpatrin/coupette
  TRIVY_SEVERITY: "LOW,MEDIUM,HIGH,CRITICAL"
  NODE_VERSION: "24"
  # Tag push → semver tag; dispatch → short SHA
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('sha-{0}', inputs.commit) || github.ref_name }}

jobs:
  # ── Build, scan, push ───────────────────────────────────────

  build-scan-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, bot, scraper]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.ref }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-and-scan
        with:
          service: ${{ matrix.service }}
          trivy-severity: ${{ env.TRIVY_SEVERITY }}
          push: "true"
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}

  # ── GitHub Release (tag push only) ─────────────────────────

  release:
    if: github.event_name == 'push'
    needs: [build-scan-push]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Extract the section between [X.Y.Z] and the next ## [
          NOTES=$(awk "/^## \\[$TAG\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for v$TAG."
          fi
          # Write to file to avoid delimiter issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

  # ── Deploy ──────────────────────────────────────────────────

  deploy:
    needs: [build-scan-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ env.IMAGE_TAG }}
          VITE_TELEGRAM_BOT_USERNAME: CoupetteBot
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Clear old frontend assets
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: rm -rf /srv/coupette/*

      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          source: "frontend/dist/*"
          target: "/srv/coupette"
          strip_components: 2

      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: SOPS_AGE_KEY,IMAGE_TAG
          script: |
            cd /opt/coupette
            if [[ "$IMAGE_TAG" == sha-* ]]; then
              git fetch origin main --no-tags
              git checkout "${IMAGE_TAG#sha-}"
            else
              git fetch origin tag "$IMAGE_TAG" --no-tags --force
              git checkout "$IMAGE_TAG"
            fi
            IMAGE_TAG="$IMAGE_TAG" ./deploy/deploy_backend.sh
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
