name: CD

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ghcr.io/vpatrin/coupette
  TRIVY_SEVERITY: "LOW,MEDIUM,HIGH,CRITICAL"

jobs:
  # ── Build, scan, push ───────────────────────────────────────

  build-scan-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, bot, scraper]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-and-scan
        with:
          service: ${{ matrix.service }}
          trivy-severity: ${{ env.TRIVY_SEVERITY }}
          push: "true"
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.ref_name }}

  # ── GitHub Release ──────────────────────────────────────────

  release:
    needs: [build-scan-push]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Extract the section between [X.Y.Z] and the next ## [
          NOTES=$(awk "/^## \\[$TAG\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for v$TAG."
          fi
          # Write to file to avoid delimiter issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
