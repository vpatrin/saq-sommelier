name: CI

on:
  pull_request:
    branches: [main, "feat/*"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.3.2"
  NODE_VERSION: "24"
  TRIVY_SEVERITY: "LOW,MEDIUM,HIGH,CRITICAL"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      scraper: ${{ steps.filter.outputs.scraper }}
      core: ${{ steps.filter.outputs.core }}
      bot: ${{ steps.filter.outputs.bot }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            scraper:
              - 'scraper/**'
            core:
              - 'core/**'
            bot:
              - 'bot/**'
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  # ── Lint ──────────────────────────────────────────────────────

  lint-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: backend
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-backend

  lint-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: scraper
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-scraper

  lint-core:
    needs: [changes]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: core
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-core

  lint-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: bot
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-bot

  lint-dockerfiles:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.scraper == 'true' || needs.changes.outputs.bot == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          ignore: DL3008,DL4006
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: scraper/Dockerfile
          ignore: DL3008,DL4006
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: bot/Dockerfile
          ignore: DL3008,DL4006

  lint-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: cd frontend && yarn --frozen-lockfile
      - run: make lint-frontend

  # ── Test ──────────────────────────────────────────────────────

  test-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: backend
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make coverage-backend
      - uses: codecov/codecov-action@v6
        with:
          files: backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  test-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: scraper
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make coverage-scraper
      - uses: codecov/codecov-action@v6
        with:
          files: scraper/coverage.xml
          flags: scraper
          token: ${{ secrets.CODECOV_TOKEN }}

  test-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: bot
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make coverage-bot
      - uses: codecov/codecov-action@v6
        with:
          files: bot/coverage.xml
          flags: bot
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: cd frontend && yarn --frozen-lockfile
      - run: make coverage-frontend
      - uses: codecov/codecov-action@v6
        with:
          files: frontend/coverage.xml
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Security ──────────────────────────────────────────────────

  audit-core:
    needs: [changes]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: core
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-core

  audit-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: backend
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-backend

  audit-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: scraper
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-scraper

  audit-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: bot
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-bot

  audit-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: cd frontend && yarn --frozen-lockfile
      - run: make audit-frontend

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker build + Trivy ─────────────────────────────────────

  build-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-scan
        with:
          service: backend
          trivy-severity: ${{ env.TRIVY_SEVERITY }}

  build-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-scan
        with:
          service: scraper
          trivy-severity: ${{ env.TRIVY_SEVERITY }}

  build-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-scan
        with:
          service: bot
          trivy-severity: ${{ env.TRIVY_SEVERITY }}

  # ── Frontend build ──────────────────────────────────────────

  build-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: cd frontend && yarn --frozen-lockfile
      - run: make build-frontend
      - name: Bundle size check
        run: cd frontend && yarn size

  # ── Summary gates ─────────────────────────────────────────────

  build:
    needs: [build-backend, build-scraper, build-bot, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.build-backend.result }}" \
            "${{ needs.build-scraper.result }}" \
            "${{ needs.build-bot.result }}" \
            "${{ needs.build-frontend.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

  lint:
    needs: [lint-backend, lint-scraper, lint-core, lint-bot, lint-dockerfiles, lint-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.lint-backend.result }}" \
            "${{ needs.lint-scraper.result }}" \
            "${{ needs.lint-core.result }}" \
            "${{ needs.lint-bot.result }}" \
            "${{ needs.lint-dockerfiles.result }}" \
            "${{ needs.lint-frontend.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

  test:
    needs: [test-backend, test-scraper, test-bot, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.test-backend.result }}" \
            "${{ needs.test-scraper.result }}" \
            "${{ needs.test-bot.result }}" \
            "${{ needs.test-frontend.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

  security:
    needs: [audit-core, audit-backend, audit-scraper, audit-bot, audit-frontend, gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.audit-core.result }}" \
            "${{ needs.audit-backend.result }}" \
            "${{ needs.audit-scraper.result }}" \
            "${{ needs.audit-bot.result }}" \
            "${{ needs.audit-frontend.result }}" \
            "${{ needs.gitleaks.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done
