name: CI

on:
  pull_request:
    branches: [main, "feat/*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  POETRY_VERSION: "2.3.2"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      scraper: ${{ steps.filter.outputs.scraper }}
      core: ${{ steps.filter.outputs.core }}
      bot: ${{ steps.filter.outputs.bot }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            scraper:
              - 'scraper/**'
            core:
              - 'core/**'
            bot:
              - 'bot/**'
            workflows:
              - '.github/workflows/**'

  # ── Lint ──────────────────────────────────────────────────────

  lint-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: backend
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-backend

  lint-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: scraper
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-scraper

  lint-core:
    needs: [changes]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: core
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-core

  lint-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: bot
          poetry-version: ${{ env.POETRY_VERSION }}
          install-args: --only dev
      - run: make lint-bot

  lint-dockerfiles:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.scraper == 'true' || needs.changes.outputs.bot == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          ignore: DL3008,DL4006
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: scraper/Dockerfile
          ignore: DL3008,DL4006
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: bot/Dockerfile
          ignore: DL3008,DL4006

  # ── Test ──────────────────────────────────────────────────────

  test-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: backend
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make coverage-backend

  test-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: scraper
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make coverage-scraper

  test-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: bot
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make coverage-bot

  # ── Security ──────────────────────────────────────────────────

  audit-core:
    needs: [changes]
    if: needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: core
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-core

  audit-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: backend
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-backend

  audit-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: scraper
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-scraper

  audit-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-service
        with:
          service: bot
          poetry-version: ${{ env.POETRY_VERSION }}
      - run: make audit-bot

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker build + Trivy ─────────────────────────────────────

  build-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-scan
        with:
          service: backend

  build-scraper:
    needs: [changes]
    if: needs.changes.outputs.scraper == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-scan
        with:
          service: scraper

  build-bot:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || needs.changes.outputs.core == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-and-scan
        with:
          service: bot

  # ── Summary gates ─────────────────────────────────────────────

  build:
    needs: [build-backend, build-scraper, build-bot]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.build-backend.result }}" \
            "${{ needs.build-scraper.result }}" \
            "${{ needs.build-bot.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

  lint:
    needs: [lint-backend, lint-scraper, lint-core, lint-bot, lint-dockerfiles]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.lint-backend.result }}" \
            "${{ needs.lint-scraper.result }}" \
            "${{ needs.lint-core.result }}" \
            "${{ needs.lint-bot.result }}" \
            "${{ needs.lint-dockerfiles.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

  test:
    needs: [test-backend, test-scraper, test-bot]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.test-backend.result }}" \
            "${{ needs.test-scraper.result }}" \
            "${{ needs.test-bot.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done

  security:
    needs: [audit-core, audit-backend, audit-scraper, audit-bot, gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - run: |
          for result in \
            "${{ needs.audit-core.result }}" \
            "${{ needs.audit-backend.result }}" \
            "${{ needs.audit-scraper.result }}" \
            "${{ needs.audit-bot.result }}" \
            "${{ needs.gitleaks.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              exit 1
            fi
          done
