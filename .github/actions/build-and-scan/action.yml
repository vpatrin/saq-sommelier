name: Build and Scan Docker Image
description: Build a Docker image with layer caching and run Trivy vulnerability scan

inputs:
  service:
    description: Service directory name (backend, scraper, bot)
    required: true
  trivy-severity:
    description: Comma-separated Trivy severity levels to fail on
    default: LOW,MEDIUM,HIGH,CRITICAL
  push:
    description: Push image to registry after scan
    default: "false"
  tags:
    description: Registry tag to push (e.g. ghcr.io/org/image:v1.0.0). Required when push is true.
    default: ""

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v4.0.0
    - uses: docker/build-push-action@v7.0.0
      with:
        context: .
        file: ${{ inputs.service }}/Dockerfile
        push: false
        load: true
        tags: saq-${{ inputs.service }}:ci
        cache-from: type=gha,scope=${{ inputs.service }}
        cache-to: type=gha,scope=${{ inputs.service }}
    - uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: saq-${{ inputs.service }}:ci
        severity: ${{ inputs.trivy-severity }}
        exit-code: 1
        ignore-unfixed: true
    # Tag + push the already-built local image (CD only)
    - if: inputs.push == 'true'
      shell: bash
      run: |
        docker tag saq-${{ inputs.service }}:ci ${{ inputs.tags }}
        docker push ${{ inputs.tags }}
